name: CI-CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    permissions:
      id-token: write
      contents: read

    env:
      PROJECT_ID: internal-sandbox-446612
      REGION: asia-south1
      REPO: my-docker-repo
      IMAGE: my-docker-app
      CLUSTER_NAME: my-gke-cluster
      CLUSTER_LOCATION: asia-south1-a
      HEALTHCHECK_URL: http://my-docker-app.default.svc.cluster.local:5000/health

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Authenticate once
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: projects/196053730058/locations/global/workloadIdentityPools/demo-tt-github-pool/providers/github-provider
        service_account: github-runner-sa-demo@internal-sandbox-446612.iam.gserviceaccount.com

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v3

    - name: Configure Docker
      run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

    # Build & Push
    - name: Build and Push Docker Image
      run: |
        docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:${{ github.sha }} .
        docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:${{ github.sha }}

    # Get GKE Credentials
    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.CLUSTER_NAME }}
        location: ${{ env.CLUSTER_LOCATION }}
        project_id: ${{ env.PROJECT_ID }}

    # Deploy
    - name: Deploy to GKE
      run: |
        kubectl set image deployment/$IMAGE \
        $IMAGE=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:${{ github.sha }}

        kubectl rollout status deployment/$IMAGE --timeout=120s

    # Health Check + Auto Rollback
    - name: Health Check inside cluster
      run: |
        POD=$(kubectl get pods -l app=$IMAGE -o jsonpath="{.items[0].metadata.name}")
        STATUS_CODE=$(kubectl exec $POD -- curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
        echo "Health check returned: $STATUS_CODE"
        if [ "$STATUS_CODE" -ne 200 ]; then
         echo "Health check failed! Rolling back..."
         echo $IMAGE
         kubectl rollout undo deployment/$IMAGE
         kubectl rollout status deployment/$IMAGE
         exit 1
        else
         echo "Application is healthy"
        fi
